<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>
    <div class="glass-form">
        <h2>Create Account</h2>
        <form action="register_process.php" method="POST">

        <p style="margin-top: 15px;">Already have an account? <a href="login.html" style="color: #38bdf8;">Login here</a></p>
